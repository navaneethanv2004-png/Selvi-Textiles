{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1>Request a Quote</h1>
    <p>Fill out the form below to receive pricing for our medical textiles.</p>
</div>

<div class="form-container">
    <h2 class="form-title">Inquiry / Order Form</h2>
    <form action="/inquiry" method="POST">
        <div class="form-group">
            <label for="name">Contact Name / Hospital Name</label>
            <input type="text" id="name" name="name" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="product">Select Product</label>
            <select id="product" name="product" class="form-control" required>
                <option value="" disabled {% if not product_name %}selected{% endif %}>--- Choose a Product ---</option>
                {% for p in products %}
                <option value="{{ p.name }}" {% if p.name==product_name %}selected{% endif %}>{{ p.name }}</option>
                {% endfor %}
                <option value="Multiple Products" {% if product_name=='Multiple Products' %}selected{% endif %}>Multiple
                    / Other Medical Textiles</option>
            </select>
        </div>

        <div class="form-group">
            <label for="quantity">Estimated Quantity</label>
            <input type="text" id="quantity" name="quantity" class="form-control"
                placeholder="e.g., 500 Rolls, 1000 Pieces" required>
        </div>

        <div class="form-group">
            <label for="message">Additional Details (Optional)</label>
            <textarea id="message" name="message" class="form-control"
                placeholder="Specific requirements, preferred delivery date, etc."></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Submit Inquiry</button>
    </form>
</div>
{% endblock %}
